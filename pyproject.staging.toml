[tool.poetry]
name = "gaius-common"
version = "0.1.0"
description = "Common microservice for V3"
authors = ["Asians Group LLC <dev.team@asians.cloud>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
django = "~=5.2"
fcm-django = "~=2.2"
python-telegram-bot = "~=21.0"
elasticsearch-dsl = "~=8.14"
django-elasticsearch-dsl = "~=8.0"

[tool.poetry.group.git.dependencies]
django-keycloak = { git = "https://github.com/asians-cloud/django-keycloak", branch = "django-5" }

[tool.poetry.group.test.dependencies]
pytest = "~=8.3"
pytest-sugar = "~=1.0"
pytest-django = "~=4.9"
django-stubs = "~=5.1"
djangorestframework-stubs = "~=3.15"
coverage = "~=7.6"
mypy = "~=1.13"
watchgod = "~=0.7"

[tool.poetry.group.dev.dependencies]
ipdb = "~=0.13"
flake8 = "~=7.1"
flake8-isort = "~=6.1"
black = "~=24.10"
pylint-django = "~=2.6"
pylint-celery = "~=0.3"
pre-commit = "~=4.0"
factory-boy = "~=3.3"
django-coverage-plugin = "~=3.1"
sphinx = "~=8.1"
sphinx-autobuild = "~=2024.10"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
